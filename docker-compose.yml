version: "3.8"

services:
  nodo1:
    build: .
    hostname: nodo1
    environment:
      - NODO_ID=1
      - HTTP_PORT=8080
      - RPC_PORT=5000
      - PEERS=2=nodo2:5000,3=nodo3:5000
      - QUORUM_N=3
      - QUORUM_W=2
      - QUORUM_R=2
    ports:
      - "8001:8080"
      - "6001:5000"
    networks:
      - sd-net

  nodo2:
    build: .
    hostname: nodo2
    environment:
      - NODO_ID=2
      - HTTP_PORT=8080
      - RPC_PORT=5000
      - PEERS=1=nodo1:5000,3=nodo3:5000
      - SEED=nodo1:5000
      - QUORUM_N=3
      - QUORUM_W=2
      - QUORUM_R=2
    ports:
      - "8002:8080"
      - "6002:5000"
    networks:
      - sd-net

  nodo3:
    build: .
    hostname: nodo3
    environment:
      - NODO_ID=3
      - HTTP_PORT=8080
      - RPC_PORT=5000
      - PEERS=1=nodo1:5000,2=nodo2:5000
      - SEED=nodo1:5000
      - QUORUM_N=3
      - QUORUM_W=2
      - QUORUM_R=2
    ports:
      - "8003:8080"
      - "6003:5000"
    networks:
      - sd-net

networks:
  sd-net:
    driver: bridge